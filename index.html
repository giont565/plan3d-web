<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>平面圖 → 3D · Plan to 3D</title>
<style>
  :root{--bg:#14141a;--panel:#1c1c24;--panel2:#232330;--line:#33333f;--text:#f2f2f4;--muted:#a6a6b2;--gold:#c9a35b;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;overflow:hidden}
  header{height:52px;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);background:rgba(20,20,26,.95)}
  header h1{font-size:16px;margin:0}
  header .sub{color:var(--muted);font-size:12px}
  header a{color:var(--gold);font-size:13px;text-decoration:none;margin-left:16px}
  .lay{display:flex;align-items:center;gap:6px;margin-left:auto}
  .lay .lbl{font-size:12px;color:var(--muted)}
  .wrap{display:flex;height:calc(100% - 52px);position:relative}
  .wrap.col{flex-direction:column}
  .left{flex:0 0 var(--split,50%);min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden}
  .right{flex:1 1 0;position:relative;min-width:0;min-height:0}
  .divider{flex:0 0 7px;background:var(--line);position:relative;z-index:6;cursor:col-resize;transition:background .15s}
  .divider:hover,.divider.drag{background:var(--gold)}
  .divider::before{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:3px;height:34px;border-radius:3px;background:rgba(255,255,255,.28)}
  .wrap.col .divider{cursor:row-resize}
  .wrap.col .divider::before{width:34px;height:3px}
  .wrap.only2d>.right,.wrap.only2d>.divider{display:none}
  .wrap.only2d>.left{flex-basis:100%}
  .wrap.only3d>.left,.wrap.only3d>.divider{display:none}
  .wrap.only3d>.right{flex:1 1 100%}
  .tools{display:flex;flex-wrap:nowrap;overflow:hidden;gap:6px;padding:9px 10px;border-bottom:1px solid var(--line);align-items:center}
  .tools>*{flex:0 0 auto}
  .tool{padding:6px 11px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;font-size:13px;user-select:none}
  .tool.sel{border-color:var(--gold);color:var(--text);background:#2a2616}
  .tool.act{background:var(--panel2);color:var(--text)}
  .ofmore{border-color:var(--gold);color:var(--gold)}
  .ofmenu{position:fixed;z-index:50;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:7px;display:flex;flex-direction:column;gap:6px;box-shadow:0 12px 30px rgba(0,0,0,.55);min-width:150px;max-width:78vw}
  .ofmenu .tool{width:100%;text-align:left}
  .ofmenu .sep{display:none}
  .ofmenu .fld{padding:2px 4px}
  .sep{width:1px;height:22px;background:var(--line);margin:0 3px}
  select,input[type=number]{background:#0e0e13;color:var(--text);border:1px solid var(--line);border-radius:7px;padding:5px 8px;font-size:13px}
  input[type=range]{vertical-align:middle}
  label.fld{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:5px}
  #cwrap{flex:1;position:relative;overflow:hidden;background:#0e0e12}
  #c2d{position:absolute;inset:0;cursor:crosshair}
  #c3d{width:100%;height:100%;display:block}
  .hint{position:absolute;left:12px;bottom:10px;font-size:12px;color:var(--muted);background:rgba(0,0,0,.5);padding:5px 9px;border-radius:7px;pointer-events:none}
  .zoombar{position:absolute;right:12px;bottom:10px;display:flex;gap:5px;z-index:4}
  .zbtn{min-width:32px;height:30px;padding:0 9px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--line);background:rgba(28,28,36,.92);color:var(--text);cursor:pointer;font-size:16px;line-height:1;user-select:none}
  .zbtn:hover{border-color:var(--gold)}
  .zbtn .zlbl{font-size:12px}
  #furnProp{position:absolute;left:12px;top:12px;z-index:5;display:flex;flex-wrap:wrap;align-items:center;gap:7px;background:rgba(28,28,36,.95);border:1px solid var(--line);border-radius:10px;padding:7px 11px;max-width:92%}
  #furnProp b{color:var(--gold);font-size:13px;margin-right:2px}
  #furnProp label{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:3px}
  #furnProp input[type=number]{width:54px}
  #furnProp input[type=color]{width:30px;height:24px;padding:0;border:1px solid var(--line);border-radius:5px;background:none;cursor:pointer}
  .badge3d{position:absolute;left:12px;top:12px;display:flex;gap:6px;z-index:3;align-items:center;flex-wrap:wrap;max-width:90%}
  .badge3d .tool{background:rgba(28,28,36,.85)}
  .badge3d select{background:rgba(28,28,36,.9)}
  .stat{position:absolute;right:12px;top:12px;font-size:12px;color:var(--muted);background:rgba(0,0,0,.5);padding:4px 9px;border-radius:7px}
  #scenPanel{position:absolute;right:12px;top:12px;z-index:5;background:rgba(28,28,36,.96);border:1px solid var(--line);border-radius:10px;padding:9px 12px;max-width:min(520px,94%);max-height:62%;overflow:auto}
  #scenPanel h3{margin:0 0 7px;font-size:13px;color:var(--gold)}
  #scenPanel h3 .subt{color:var(--muted);font-weight:400;font-size:11px;margin-left:6px}
  #scenPanel table{border-collapse:collapse;font-size:12px;width:100%}
  #scenPanel th,#scenPanel td{padding:3px 7px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
  #scenPanel th:first-child,#scenPanel td:first-child{text-align:left}
  #scenPanel th{color:var(--muted);font-weight:600}
  #scenPanel .best{color:var(--gold);font-weight:700}
  #scenPanel .cur{color:var(--gold)}
  #scenPanel .op{color:#5ec8e0;cursor:pointer;margin-left:7px;user-select:none}
  #scenPanel .op:hover{text-decoration:underline}
  input[type=file]{display:none}
  #ulbar{display:none;background:#191915}
</style>
</head>
<body>
<header>
  <h1>平面圖 → 3D</h1>
  <span class="sub">左邊畫平面，右邊即時長成 3D（純程式、不花錢）</span>
  <div class="lay">
    <span class="lbl">比對</span>
    <div class="tool act" id="laySplit">分割</div>
    <div class="tool" id="lay2d">全2D</div>
    <div class="tool" id="lay3d">全3D</div>
    <span class="sep"></span>
    <div class="tool" id="layAxis" title="切換：左右並排 / 上下並排">⬌ 左右</div>
  </div>
  <span class="sub" style="margin-left:14px">網頁版</span>
</header>
<div class="wrap">
  <div class="left">
    <div class="tools">
      <div class="tool sel" data-tool="wall">牆</div>
      <div class="tool" data-tool="door">門</div>
      <div class="tool" data-tool="window">窗</div>
      <div class="tool" data-tool="rail">欄杆</div>
      <div class="tool" data-tool="furn">家具</div>
      <select id="furnType" title="家具種類">
        <optgroup label="辦公">
          <option value="workstation">工位</option><option value="desk">辦公桌</option>
          <option value="ochair">辦公椅</option><option value="gchair">會客椅</option><option value="conf">會議桌</option>
          <option value="cabinet">檔案櫃</option><option value="rack">機櫃</option>
          <option value="printer">事務機</option><option value="screen">屏風</option>
          <option value="gpart">玻璃隔屏</option><option value="dscreen">桌上屏風</option><option value="etable">橢圓會議桌</option>
          <option value="column">柱</option>
          <option value="sofa">沙發</option><option value="plant">盆栽</option>
          <option value="ldesk">L型辦公桌</option><option value="rdesk">回桌</option><option value="reception">接待櫃台</option>
          <option value="drawer3">三層櫃</option><option value="bookshelf">開放書架</option>
          <option value="whiteboard">白板</option><option value="water">飲水機</option><option value="credenza">矮櫃</option>
        </optgroup>
        <optgroup label="沙發桌椅">
          <option value="sectional">轉角沙發</option><option value="armchair">單人沙發</option>
          <option value="round">圓桌</option><option value="stool">圓凳</option>
        </optgroup>
        <optgroup label="居家">
          <option value="bed">床</option><option value="table">桌</option>
          <option value="chair">椅</option><option value="fridge">冰箱</option>
          <option value="toilet">馬桶</option>
        </optgroup>
      </select>
      <div class="tool" data-tool="tmpl">模板</div>
      <select id="tmplType" title="座位／辦公室標準模板">
        <option value="eng1">工程師-單座</option><option value="eng2">工程師-雙座</option>
        <option value="deputy">副理</option><option value="secretary">秘書</option><option value="manager">部經辦公室</option>
      </select>
      <div class="tool" data-tool="seatfill" title="拖一個區域，自動排滿工位、4 個朝向選座位最多">排座</div>
      <label class="fld">走道<input id="aisleW" type="number" value="1.2" step="0.1" min="0.6" max="3" style="width:48px"> m</label>
      <div class="tool" data-tool="move">選取/移動</div>
      <div class="tool" data-tool="erase">刪除</div>
      <div class="tool" data-tool="selwall">框選刪牆</div>
      <div class="tool" data-tool="setlen">設牆長校正</div>
      <div class="tool" id="roomBtn" title="自動認出每個房間：算面積、畫「圓圈＋連線」看哪些房間有門相通；沒有門進得去的房間標紅">房間分析</div>
      <div class="tool" id="lightBtn" title="依窗戶位置估算室內採光，疊上熱圖：亮黃＝光線好、深藍＝最暗（簡化估算、輔助比較用）">採光</div>
      <div class="tool" id="scenBtn" title="把目前配置存成方案 A/B/C…，面積/房間/座位/採光並排比較、一鍵切換">方案比較</div>
      <div class="sep"></div>
      <label class="fld">牆高<input id="wallH" type="number" value="2.8" step="0.1" min="2" max="6" style="width:58px"> m</label>
      <div class="sep"></div>
      <div class="tool" id="undo">復原</div>
      <div class="tool" id="clear">清空</div>
      <div class="tool" id="sample">範例</div>
      <div class="tool" id="save">存檔</div>
      <div class="tool" id="load">讀檔</div>
      <div class="tool" id="img">匯入底圖（圖片/PDF）</div>
      <input type="file" id="loadFile" accept="application/json">
      <input type="file" id="imgFile" accept="image/*,application/pdf,.pdf">
    </div>
    <div class="tools" id="ulbar">
      <span style="font-size:12px;color:var(--muted)">底圖：</span>
      <label class="fld">透明<input id="ulOpacity" type="range" min="0" max="1" step="0.05" value="0.45" style="width:80px"></label>
      <label class="fld">大小<input id="ulScale" type="range" min="0.15" max="6" step="0.05" value="1" style="width:90px"></label>
      <div class="tool" id="ulMove">移動底圖</div>
      <div class="tool" id="ulCalib">校正比例</div>
      <div class="tool" id="ulCrop">框選範圍</div>
      <label class="fld" title="往右＝只保留越長的主結構牆，濾掉家具/隔間細線。密集樓層往右拉">簡化<input id="ulSimplify" type="range" min="1" max="4.5" step="0.1" value="1.9" style="width:96px"><span id="ulSimVal" style="min-width:26px;display:inline-block">1.9</span></label>
      <label class="fld" style="cursor:pointer"><input type="checkbox" id="ulPlaus" checked> 濾假牆(合理性)</label>
      <div class="tool pin" id="ulAuto" style="border-color:var(--gold);color:var(--gold);font-weight:700">⚙ 自動描牆</div>
      <div class="tool pin" id="ulFurn" style="border-color:var(--gold);color:var(--gold);font-weight:700" title="自動認出平面圖上的工位桌組並放成家具（要先校正比例）">⚙ 自動家具</div>
      <div class="tool" id="ulGt" title="把你修正後的桌/椅/柱存成訓練標注（修正即標注），並給機器這次的辨識打分">回饋標注</div>
      <div class="tool" id="ulClear">清除底圖</div>
    </div>
    <div id="cwrap"><canvas id="c2d"></canvas>
      <div id="furnProp" style="display:none">
        <b id="fpLabel">家具</b>
        <label>寬<input id="fpW" type="number" step="0.1" min="0.1"> m</label>
        <label>深<input id="fpD" type="number" step="0.1" min="0.1"> m</label>
        <label>高<input id="fpH" type="number" step="0.1" min="0.1"> m</label>
        <label>色<input id="fpColor" type="color"></label>
        <label>角度<input id="fpRot" type="number" step="5" min="0" max="360"> °</label>
        <div class="tool" id="fpReset">重設</div>
      </div>
      <div id="scenPanel" style="display:none">
        <h3>方案比較<span class="subt">把不同排法存起來、數據並排比</span></h3>
        <div id="scenBody"></div>
      </div>
      <div class="hint" id="hint">牆：點起點→點終點（會接續，按 Esc 結束一段）</div>
      <div class="zoombar">
        <div class="zbtn" id="zOut" title="縮小">－</div>
        <div class="zbtn" id="zFit" title="符合視窗（看到全部）"><span class="zlbl">符合</span></div>
        <div class="zbtn" id="zIn" title="放大">＋</div>
      </div>
    </div>
  </div>
  <div class="divider" id="divider"></div>
  <div class="right">
    <div class="badge3d">
      <select id="pack" title="材質包"></select>
      <div class="tool act" id="view3d">透視</div>
      <div class="tool" id="viewTop">俯視</div>
      <div class="tool" id="walk">走進去</div>
      <div class="tool" id="ceil">天花板</div>
      <div class="tool" id="wallghost" title="牆改半透明，看得進房間內部">牆透明</div>
      <div class="tool act" id="lbl">標示</div>
    </div>
    <div class="stat" id="stat3d"></div>
    <canvas id="c3d"></canvas>
    <div class="hint" id="hint3d">滑鼠拖曳轉視角・滾輪縮放・右鍵平移</div>
  </div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

// ===== 資料模型（單位：公尺）=====
const FURN = {
  bed:    {w:2.0,d:1.5,h:0.5, c:0x8d6e63, mat:'wood', label:'床'},
  sofa:   {w:2.0,d:0.9,h:0.8, c:0x5c6bc0, mat:'fabric', label:'沙發'},
  table:  {w:1.4,d:0.8,h:0.45,c:0x9c6b3f, mat:'wood', label:'桌'},
  desk:   {w:1.4,d:0.7,h:0.74,c:0xc7a675, mat:'wood', label:'辦公桌'},
  chair:  {w:0.5,d:0.5,h:0.9, c:0x8d6e63, mat:'wood', label:'椅'},
  cabinet:{w:1.0,d:0.45,h:1.8,c:0xe4e0d8, mat:'wood', label:'櫃'},
  fridge: {w:0.7,d:0.7,h:1.8, c:0xd5dadd, mat:'metal', label:'冰箱'},
  toilet: {w:0.5,d:0.7,h:0.8, c:0xeef2f3, mat:'ceramic', label:'馬桶'},
  // 辦公家具（大辦公室用）
  workstation:{w:1.6,d:1.4,h:0.75,c:0x9c8f7a, mat:'wood',   label:'工位'},
  conf:   {w:3.0,d:1.2,h:0.75, c:0x8d6e63, mat:'wood',   label:'會議桌'},
  ochair: {w:0.67,d:0.48,h:1.15, c:0x2b2d31, mat:'fabric', label:'辦公椅'},
  gchair: {w:0.6,d:0.55,h:0.92, c:0x2b2d31, mat:'fabric', label:'會客椅'},
  rack:   {w:0.6,d:0.8,h:2.0,  c:0x2b2b30, mat:'metal',  label:'機櫃'},
  printer:{w:0.6,d:0.65,h:1.1, c:0x4a5158, mat:'metal',  label:'事務機'},
  screen: {w:1.4,d:0.05,h:1.2, c:0xb9c3b2, mat:'fabric', label:'屏風'},
  plant:  {w:0.5,d:0.5,h:1.3,  c:0x4f7942, mat:'soft',   label:'盆栽'},
  ldesk:    {w:1.8,d:1.6,h:0.75, c:0xb0a896, mat:'wood',  label:'L型辦公桌'},
  rdesk:    {w:0.45,d:1.0,h:0.74, c:0xc7a675, mat:'wood', label:'回桌'},
  sectional:{w:2.6,d:2.0,h:0.8,  c:0x6b7a8f, mat:'fabric',label:'轉角沙發'},
  armchair: {w:0.95,d:0.95,h:0.85,c:0x8d7b6b,mat:'fabric',label:'單人沙發'},
  round:    {w:1.2,d:1.2,h:0.74, c:0x9c6b3f, mat:'wood',  label:'圓桌'},
  stool:    {w:0.42,d:0.42,h:0.62,c:0x37474f,mat:'fabric',label:'圓凳'},
  reception:{w:2.2,d:0.7,h:1.1,  c:0xb0a896, mat:'wood',  label:'接待櫃台'},
  drawer3:  {w:0.4,d:0.56,h:0.66, c:0x55585e, mat:'metal', label:'三層櫃'},
  bookshelf:{w:0.9,d:0.32,h:1.8, c:0xb0a896, mat:'wood',  label:'開放書架'},
  whiteboard:{w:1.6,d:0.1,h:1.9, c:0xf6f7f8,mat:'plaster',label:'白板'},
  water:    {w:0.36,d:0.36,h:1.1,c:0xeef2f3, mat:'plaster',label:'飲水機'},
  credenza: {w:1.6,d:0.45,h:0.75,c:0xcdbfa6, mat:'wood',  label:'矮櫃'},
  column:   {w:0.6,d:0.6,h:2.8, c:0xcfccc4, mat:'plaster',label:'柱'},        // 結構柱：3D 跟著牆高、像牆一樣頂到天花
  schair:   {w:0.5,d:0.5,h:0.5, c:0x3a3d42, mat:'fabric', label:'椅'},        // 輕量椅(自動辨識批量用·3 零件不卡 3D·對稱無朝向)
  // 普立美型錄參考款（2026-06-11）
  gpart:    {w:1.2,d:0.06,h:1.8, c:0xd7e4ea, mat:'metal', label:'玻璃隔屏'},   // 2.5cm玻璃隔間系列：鋁框+霧玻
  dscreen:  {w:1.2,d:0.03,h:1.15,c:0x9aa4b0, mat:'fabric',label:'桌上屏風'},   // 工作站桌上型布屏(夾桌面)
  etable:   {w:2.0,d:1.0,h:0.74, c:0xc7a675, mat:'wood',  label:'橢圓會議桌'}, // 主管會議桌(橢圓/船形)
};
const DOOR_W=0.9, WIN_W=1.2, WIN_SILL=0.9, WIN_HEAD=2.2;
function effFurn(f){ const B=FURN[f.type]; if(!B) return null;   // 每件家具的尺寸/顏色覆寫（沒設就用預設）
  return {...B, w:f.w||B.w, d:f.d||B.d, h:f.h||B.h, c:(f.color!=null?f.color:B.c)}; }
// 2D 俯視輪廓：依家具型別在已 translate+rotate 的 local 座標建 path（呼叫端統一 fill+stroke），與右側 3D 造型對齊；回傳 label 錨點
function furnPath2D(ctx,f,F){ const P=view.ppm, hw=Math.max(1,F.w*P/2), hd=Math.max(1,F.d*P/2); ctx.beginPath();  // 半尺寸夾正：防負/零尺寸令 arc 拋例外、L 形自交
  const arm=m=>Math.min(Math.max(m*P,2), Math.min(hw,hd)*1.5);   // 臂厚 px：固定公尺(與 3D 同)，夾在 [2, 短半徑×1.5] 恆正且不吃掉整塊
  if(f.type==='round'||f.type==='stool'||f.type==='ochair'||f.type==='gchair'||f.type==='plant'||f.type==='schair'){
    ctx.arc(0,0,Math.min(hw,hd),0,Math.PI*2); return {x:0,y:0}; }            // 圓桌/圓凳/辦公椅/輕量椅/盆栽＝圓
  if(f.type==='etable'){ ctx.ellipse(0,0,hw,hd,0,0,Math.PI*2); return {x:0,y:0}; }   // 橢圓會議桌＝橢圓
  if(f.type==='ldesk'){ const a=arm(0.72);                                   // L型辦公桌：缺右下角(後緣橫臂＋左緣縱臂)
    ctx.moveTo(-hw,-hd);ctx.lineTo(hw,-hd);ctx.lineTo(hw,-hd+a);ctx.lineTo(-hw+a,-hd+a);ctx.lineTo(-hw+a,hd);ctx.lineTo(-hw,hd);ctx.closePath();
    return {x:0,y:-hd+a/2}; }
  if(f.type==='sectional'){ const a=arm(0.9);                                // 轉角沙發：缺右上角(前緣橫臂＋左緣縱臂)
    ctx.moveTo(-hw,-hd);ctx.lineTo(-hw+a,-hd);ctx.lineTo(-hw+a,hd-a);ctx.lineTo(hw,hd-a);ctx.lineTo(hw,hd);ctx.lineTo(-hw,hd);ctx.closePath();
    return {x:0,y:hd-a/2}; }
  ctx.rect(-hw,-hd,hw*2,hd*2); return {x:0,y:0}; }                          // 其餘＝矩形 footprint

// ─── 排座解算：框選區域自動鋪工位模板（eng1/eng2），4 個朝向都算、取座位最多 ───
function rotTmplPt(x,y,w,h,k){ let X=x,Y=y,W=w,H=h; for(let i=0;i<(k&3);i++){ const nx=H-Y,ny=X; X=nx;Y=ny; const t=W;W=H;H=t; } return [X,Y]; }   // 模板局部座標旋轉 k×90°
function cellBlocked(cx,cy,tw,th){ const r={x1:cx+0.02,y1:cy+0.02,x2:cx+tw-0.02,y2:cy+th-0.02};   // 工位格與既有牆/家具碰撞檢查(略內縮防誤判貼邊)
  for(const w of plan.walls){ if(wallInRect(w,r)) return true; }
  for(const f of plan.furn){ const F=effFurn(f); if(!F)continue; const hor=Math.abs(Math.cos(f.rot||0))>0.7, sw=hor?F.w:F.d, sd=hor?F.d:F.w;
    if(f.x+sw/2>r.x1&&f.x-sw/2<r.x2&&f.y+sd/2>r.y1&&f.y-sd/2<r.y2) return true; }
  return false; }
function seatFillPlan(r){ const key=document.getElementById('tmplType').value; const tk=(key==='eng2')?'eng2':'eng1'; const t=TEMPLATES[tk];   // 只支援工位模板，其他選項視同單座
  const seatsPer=(tk==='eng2')?2:1, GAP=0.05, aisle=Math.max(0.6,parseFloat(document.getElementById('aisleW').value)||1.2);
  const x0=Math.min(r.x1,r.x2), y0=Math.min(r.y1,r.y2), zw=Math.abs(r.x2-r.x1), zh=Math.abs(r.y2-r.y1);
  let best=null;
  for(let k=0;k<4;k++){ const tw=(k%2===0)?t.w:t.h, th=(k%2===0)?t.h:t.w, px=tw+GAP, py=th+aisle;   // 行內距=屏風縫、排距=模板深+走道
    if(zw<tw||zh<th) continue;
    const cols=Math.floor((zw-tw)/px)+1, rows=Math.floor((zh-th)/py)+1;
    const ox=x0+(zw-((cols-1)*px+tw))/2, oy=y0+(zh-((rows-1)*py+th))/2, cells=[];   // 置中擺放
    for(let ri=0;ri<rows;ri++)for(let ci=0;ci<cols;ci++){ const cx=ox+ci*px, cy=oy+ri*py; if(!cellBlocked(cx,cy,tw,th)) cells.push([cx,cy]); }
    if(cells.length&&(!best||cells.length>best.cells.length)) best={k,tk,cells,tw,th,seats:cells.length*seatsPer,aisle}; }
  return best; }
function seatFillApply(r){ const best=seatFillPlan(r); const hint=document.getElementById('hint');
  if(!best){ if(hint)hint.textContent='排座：區域太小或全被既有牆/家具擋住，沒排進任何座位，圈大一點再試'; return; }
  pushHistory(); const t=TEMPLATES[best.tk]; const start=plan.furn.length;
  best.cells.forEach(([cx,cy])=>{ t.furn.forEach(f=>{ const [X,Y]=rotTmplPt(f.x,f.y,t.w,t.h,best.k);
    const nf={type:f.type,x:cx+X,y:cy+Y,rot:(f.rot||0)+best.k*Math.PI/2}; if(f.w!=null)nf.w=f.w; if(f.d!=null)nf.d=f.d; if(f.h!=null)nf.h=f.h; if(f.color!=null)nf.color=f.color; if(f.board)nf.board=f.board; plan.furn.push(nf); }); });
  selFurn.clear(); for(let i=start;i<plan.furn.length;i++) selFurn.add(i);
  rebuildFurn(); render2d();
  if(hint)hint.textContent='排座完成：'+best.cells.length+' 個'+t.name+'（共 '+best.seats+' 個座位）、朝向 '+(best.k*90)+'°、走道 '+best.aisle.toFixed(1)+' m。整批已選取可拖移微調，Ctrl+Z 復原'; }

function clone(o){ return JSON.parse(JSON.stringify(o)); }
let history=[], redoStack=[];
function pushHistory(){ history.push(clone(plan)); if(history.length>60) history.shift(); redoStack.length=0; }
function undo(){ if(history.length){ redoStack.push(clone(plan)); plan=history.pop(); clearSel(); rebuild(); } }

// ===== 房間分析 / 採光熱圖 / 方案比較（2026-06-11 整併：參考 Finch 房間連通圖、Spacio 性能分析、Hektar 多方案比較）=====
let showRooms=false, showLight=false;       // 2D 疊圖開關
let anCache=null, anDirty=true;             // 分析快取：牆/門窗變動時 rebuild() 標髒；家具變動不影響房間/採光
const ROOM_COLS=['#e0b15a','#5ec8e0','#9ccc65','#ef9a9a','#ba9ae0','#80cbc4','#f0c987','#90a8e0','#c5e1a5','#e0a8c0'];
function analyzeGrid(){ const pts=[]; plan.walls.forEach(w=>{pts.push([w.x1,w.y1],[w.x2,w.y2]);}); if(pts.length<2) return null;
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9; pts.forEach(([x,y])=>{minx=Math.min(minx,x);miny=Math.min(miny,y);maxx=Math.max(maxx,x);maxy=Math.max(maxy,y);});
  const w=maxx-minx,d=maxy-miny; if(w<=0||d<=0) return null;
  const cell=Math.max(0.08,Math.min(w,d)/120);                          // 跟 buildFloor 同一套格子邏輯（牆畫進格→外圍 flood fill）
  const gw=Math.max(3,Math.ceil(w/cell)), gh=Math.max(3,Math.ceil(d/cell));
  const wall=new Uint8Array(gw*gh), lwall=new Uint8Array(gw*gh);        // wall=隔房間(含欄杆)；lwall=擋光(不含欄杆，光跨得過矮欄)
  const T=Math.max(1,Math.round((plan.wallT||0.12)/cell/2)+1);
  for(const wl of plan.walls){ const x1=(wl.x1-minx)/cell,y1=(wl.y1-miny)/cell,x2=(wl.x2-minx)/cell,y2=(wl.y2-miny)/cell;
    const n=Math.ceil(Math.hypot(x2-x1,y2-y1))+1;
    for(let k=0;k<=n;k++){ const t=k/n,cx=Math.round(x1+(x2-x1)*t),cy=Math.round(y1+(y2-y1)*t);
      for(let a=-T;a<=T;a++)for(let b=-T;b<=T;b++){ const X=cx+a,Y=cy+b; if(X>=0&&X<gw&&Y>=0&&Y<gh){ wall[Y*gw+X]=1; if(wl.h==null) lwall[Y*gw+X]=1; } } } }
  const sd=Math.max(2,Math.round(0.16/cell)); let wd=wall;              // 膨脹封小縫（同 buildFloor），房間才不會從牆角漏出去
  for(let p=0;p<sd;p++){ const nw=wd.slice(); for(let y=0;y<gh;y++)for(let x=0;x<gw;x++){ const i=y*gw+x; if(wd[i])continue;
    if((x>0&&wd[i-1])||(x<gw-1&&wd[i+1])||(y>0&&wd[i-gw])||(y<gh-1&&wd[i+gw])) nw[i]=1; } wd=nw; }
  const out=new Uint8Array(gw*gh), st=[]; const push=i=>{ if(!wd[i]&&!out[i]){out[i]=1;st.push(i);} };
  for(let x=0;x<gw;x++){ push(x); push((gh-1)*gw+x); } for(let y=0;y<gh;y++){ push(y*gw); push(y*gw+gw-1); }
  while(st.length){ const i=st.pop(),x=i%gw,y=(i/gw)|0; if(x>0)push(i-1); if(x<gw-1)push(i+1); if(y>0)push(i-gw); if(y<gh-1)push(i+gw); }
  const lbl=new Int16Array(gw*gh).fill(-1), rooms=[];                   // 連通元件＝房間（太小的碎縫不算）
  for(let s0=0;s0<gw*gh;s0++){ if(wd[s0]||out[s0]||lbl[s0]>=0) continue;
    const q=[s0], cs=[]; lbl[s0]=-9;                                     // -9＝標記中
    while(q.length){ const i=q.pop(); cs.push(i); const x=i%gw,y=(i/gw)|0;
      [[x-1,y],[x+1,y],[x,y-1],[x,y+1]].forEach(([X,Y])=>{ if(X>=0&&X<gw&&Y>=0&&Y<gh){ const j=Y*gw+X; if(!wd[j]&&!out[j]&&lbl[j]===-1){ lbl[j]=-9; q.push(j); } } }); }
    const area=cs.length*cell*cell;
    if(area>=0.8){ const id=rooms.length; let sx=0,sy=0; cs.forEach(i=>{ lbl[i]=id; sx+=i%gw; sy+=(i/gw)|0; });
      rooms.push({area, cx:minx+(sx/cs.length+0.5)*cell, cy:miny+(sy/cs.length+0.5)*cell}); }
    else cs.forEach(i=>{ lbl[i]=-3; }); }                                // 碎縫：不是房間、也不是室外
  return {minx,miny,cell,gw,gh,wall:wd,lwall,out,lbl,rooms}; }
function analyzeRooms(){ if(!anDirty&&anCache) return anCache;
  const g=analyzeGrid(); if(!g){ anCache=null; anDirty=false; return null; }
  const cellAt=(x,y)=>{ const cx=Math.floor((x-g.minx)/g.cell), cy=Math.floor((y-g.miny)/g.cell);
    if(cx<0||cx>=g.gw||cy<0||cy>=g.gh) return -1;                        // 圖外＝室外
    const i=cy*g.gw+cx; if(g.out[i]) return -1; const v=g.lbl[i]; return v>=0?v:-2; };
  const probe=(x,y,nx,ny)=>{ for(const m of [0.3,0.45,0.65,0.9,1.2]){ const r=cellAt(x+nx*m,y+ny*m); if(r>=0||r===-1) return r; } return -2; };
  const edges=[];                                                        // 門的兩側各探一下落在哪個房間 → 連通邊
  for(const o of plan.openings){ if(o.type!=='door') continue; const nw=nearestWall(o.x,o.y); if(!nw) continue;
    const w=plan.walls[nw.idx], L=Math.hypot(w.x2-w.x1,w.y2-w.y1)||1, nx=-(w.y2-w.y1)/L, ny=(w.x2-w.x1)/L;
    const a=probe(o.x,o.y,nx,ny), b=probe(o.x,o.y,-nx,-ny);
    if(a===-2||b===-2||a===b) continue;
    edges.push({a,b,x:o.x,y:o.y}); }
  const adj=new Map(); const addE=(a,b)=>{ if(!adj.has(a))adj.set(a,new Set()); adj.get(a).add(b); };
  edges.forEach(e=>{ addE(e.a,e.b); addE(e.b,e.a); });
  const seen=new Set([-1]), q=[-1];                                      // 從室外出發經門 BFS：到不了的房間＝沒有門能進去
  while(q.length){ const n=q.pop(); (adj.get(n)||new Set()).forEach(m=>{ if(!seen.has(m)){seen.add(m);q.push(m);} }); }
  g.rooms.forEach((r,i)=>{ r.doors=(adj.get(i)||new Set()).size; r.reach=seen.has(i); });
  anCache={...g,edges}; anDirty=false; return anCache; }
function computeLight(){ const A=analyzeRooms(); if(!A) return null; if(A.light) return A;

  const light=new Float32Array(gw*gh);

function texCanvas(w,h,draw){ const cv=document.createElement('canvas');cv.width=w;cv.height=h;
  draw(cv.getContext('2d'),w,h); const t=new THREE.CanvasTexture(cv); t.colorSpace=THREE.SRGBColorSpace;
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.anisotropy=4; return t; }
function hx(c){return '#'+c.toString(16).padStart(6,'0');}
function sh(c,f){const r=c>>16&255,g=c>>8&255,b=c&255;const k=v=>Math.max(0,Math.min(255,v*f|0));return `rgb(${k(r)},${k(g)},${k(b)})`;}

function woodTex(base){ return texCanvas(256,256,(g,w,h)=>{ g.fillStyle=hx(base);g.fillRect(0,0,w,h);
  const planks=4, ph=h/planks;
  for(let i=0;i<planks;i++){ g.fillStyle=sh(base,0.9+rnd(i)*0.16); g.fillRect(0,i*ph,w,ph);
    for(let k=0;k<16;k++){ g.globalAlpha=.18; g.strokeStyle=sh(base,0.75+0.3*rnd(i*9+k)); g.lineWidth=1;
      const y=i*ph+rnd(i*3+k)*ph; g.beginPath();g.moveTo(0,y);g.bezierCurveTo(w*.3,y+2,w*.6,y-2,w,y+1);g.stroke(); }
    g.globalAlpha=1; g.strokeStyle=sh(base,0.55); g.lineWidth=2; g.beginPath();g.moveTo(0,i*ph);g.lineTo(w,i*ph);g.stroke(); }
}); }
function concreteTex(base){ return texCanvas(256,256,(g,w,h)=>{ g.fillStyle=hx(base);g.fillRect(0,0,w,h);

function railOpenBoundary(){   // 在建築外框的「開放邊」(無牆處)補上矮欄杆＝陽台/露台
  const ws=plan.walls.filter(w=>w.h==null); if(ws.length<4) return 0;
  let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9;
  ws.forEach(w=>{mnx=Math.min(mnx,w.x1,w.x2);mny=Math.min(mny,w.y1,w.y2);mxx=Math.max(mxx,w.x1,w.x2);mxy=Math.max(mxy,w.y1,w.y2);});
  const tol=0.7, rails=[];
  const edges=[{f:mny,ax:'h',lo:mnx,hi:mxx},{f:mxy,ax:'h',lo:mnx,hi:mxx},{f:mnx,ax:'v',lo:mny,hi:mxy},{f:mxx,ax:'v',lo:mny,hi:mxy}];
  for(const e of edges){
    const cov=[];
    for(const w of ws){
      if(e.ax==='h'){ if(Math.abs(w.y1-w.y2)<0.06 && Math.abs((w.y1+w.y2)/2-e.f)<tol) cov.push([Math.min(w.x1,w.x2),Math.max(w.x1,w.x2)]); }
      else { if(Math.abs(w.x1-w.x2)<0.06 && Math.abs((w.x1+w.x2)/2-e.f)<tol) cov.push([Math.min(w.y1,w.y2),Math.max(w.y1,w.y2)]); }
    }
    cov.sort((a,b)=>a[0]-b[0]); let cur=e.lo; const gaps=[];
    for(const [a,b] of cov){ if(a>cur+0.1) gaps.push([cur,Math.min(a,e.hi)]); cur=Math.max(cur,b); if(cur>=e.hi)break; }
    if(cur<e.hi) gaps.push([cur,e.hi]);
    for(const [a,b] of gaps){ if(b-a>=1.3){
      rails.push(e.ax==='h'?{x1:a,y1:e.f,x2:b,y2:e.f,h:1.0}:{x1:e.f,y1:a,x2:e.f,y2:b,h:1.0}); } }
  }
  plan.walls.push(...rails); return rails.length;
}

function buildFurn(g){ plan.furn.forEach(f=>{ const F=effFurn(f); if(!F)return; g.add(buildPiece(f));
  if(showLabels){ const lb=makeLabel(F.label); lb.position.set(f.x,F.h+0.35,f.y); g.add(lb); } });
  addScreenCorners(g); }
function addScreenCorners(g){   // 屏風 L 轉角自動生成圓弧連接柱
  const ss=[]; plan.furn.forEach(f=>{ if(f.type!=='screen')return; const F=effFurn(f); if(!F)return;
    const c=Math.cos(f.rot||0),s=Math.sin(f.rot||0), hw=F.w/2;
    ss.push({h:F.h, e:[[f.x-c*hw,f.y-s*hw],[f.x+c*hw,f.y+s*hw]]}); });   // 每片屏風兩端點(世界座標)
  const done=[];
  for(let i=0;i<ss.length;i++)for(let j=i+1;j<ss.length;j++)
    for(const a of ss[i].e)for(const b of ss[j].e){
      if(Math.hypot(a[0]-b[0],a[1]-b[1])>=0.16) continue;                // 兩端點接近=轉角
      const cx=(a[0]+b[0])/2, cz=(a[1]+b[1])/2;
      if(done.some(d=>Math.hypot(d[0]-cx,d[1]-cz)<0.1)) continue; done.push([cx,cz]);
      const h=Math.min(ss[i].h,ss[j].h);
      const post=cyl(0.05,0.05,h,furnMat(0x70747a,'metal'),16); post.position.set(cx,h/2,cz); g.add(post);   // 圓弧轉角連接柱
      const cap=cyl(0.056,0.056,0.04,furnMat(0x4e5157,'metal'),16); cap.position.set(cx,h-0.02,cz); g.add(cap); } }
function updateStat(){ let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9; for(const w of plan.walls){mnx=Math.min(mnx,w.x1,w.x2);mny=Math.min(mny,w.y1,w.y2);mxx=Math.max(mxx,w.x1,w.x2);mxy=Math.max(mxy,w.y1,w.y2);}
  const dim=plan.walls.length?`　｜外框 ${(mxx-mnx).toFixed(2)}×${(mxy-mny).toFixed(2)} m`:'';
  const el=document.getElementById('stat3d'); if(el) el.textContent=`${plan.walls.length} 牆・${plan.openings.length} 門窗・${plan.furn.length} 家具${dim}`;
  scTouch(); }                                                          // 方案比較面板開著的話，緩衝刷新「目前畫面」那列數據
function rebuildFurn(){ render2d(); scene.remove(furnGroup);          // 只重建家具（牆不動）→ 改家具不卡
  furnGroup.traverse(o=>{if(o.geometry)o.geometry.dispose();}); furnGroup=new THREE.Group();
  buildFurn(furnGroup); scene.add(furnGroup); updateStat(); }
function rebuild(){ scene.remove(modelGroup); anDirty=true;            // 全部重建（牆變動時用）；牆/門窗變了→房間/採光分析快取標髒
  modelGroup.traverse(o=>{if(o.geometry)o.geometry.dispose();}); modelGroup=new THREE.Group();
  const H=plan.wallH||2.8,T=plan.wallT||0.12; const bounds=buildFloor(modelGroup);
  for(const w of plan.walls) buildWall(modelGroup,w,H,T); scene.add(modelGroup);
  if(bounds&&!walkMode) orbit.target.set((bounds.minx+bounds.maxx)/2,1,(bounds.miny+bounds.maxy)/2);
  rebuildFurn(); }

// 材質包選擇
const packSel=document.getElementById('pack');
packSel.innerHTML=Object.entries(PACKS).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join('');
packSel.value=currentPack; packSel.onchange=()=>{ currentPack=packSel.value; applyPack(); rebuild(); };
// ===== 家具屬性面板：尺寸(寬/深/高) + 顏色 =====
function updateFurnProp(){ const p=document.getElementById('furnProp'); if(!p) return;
  if(tool!=='move' || !selFurn || selFurn.size===0){ p.style.display='none'; return; }
  p.style.display='flex';
  if(/^fp(W|D|H|Color)$/.test((document.activeElement||{}).id)) return;   // 編輯中別覆寫輸入框
  let idx=null; selFurn.forEach(i=>{ if(idx==null && plan.furn[i]) idx=i; }); if(idx==null) return;
  const f=plan.furn[idx], F=effFurn(f); if(!F) return;
  document.getElementById('fpLabel').textContent=(FURN[f.type].label||'家具')+(selFurn.size>1?(' ×'+selFurn.size):'');
  document.getElementById('fpW').value=F.w.toFixed(2);
  document.getElementById('fpD').value=F.d.toFixed(2);
  document.getElementById('fpH').value=F.h.toFixed(2);
  document.getElementById('fpColor').value='#'+('000000'+F.c.toString(16)).slice(-6);
  document.getElementById('fpRot').value=(((Math.round((f.rot||0)*180/Math.PI))%360)+360)%360;
}
['fpW','fpD','fpH'].forEach((id,k)=>{ const key=['w','d','h'][k]; const el=document.getElementById(id);
  if(el) el.onchange=e=>{ const v=parseFloat(e.target.value); if(!(v>0)){ updateFurnProp(); return; }
    pushHistory(); selFurn.forEach(i=>{ if(plan.furn[i]) plan.furn[i][key]=+v.toFixed(3); }); rebuildFurn(); }; });
{ const ce=document.getElementById('fpColor'); if(ce) ce.onchange=e=>{ const c=parseInt(e.target.value.slice(1),16);
    pushHistory(); selFurn.forEach(i=>{ if(plan.furn[i]) plan.furn[i].color=c; }); rebuildFurn(); }; }
{ const ro=document.getElementById('fpRot'); if(ro) ro.onchange=e=>{ let d=parseFloat(e.target.value); if(isNaN(d))return; d=((d%360)+360)%360;
    pushHistory(); selFurn.forEach(i=>{ if(plan.furn[i]) plan.furn[i].rot=d*Math.PI/180; }); rebuildFurn(); }; }
{ const re=document.getElementById('fpReset'); if(re) re.onclick=()=>{ if(!selFurn.size)return; pushHistory();
    selFurn.forEach(i=>{ const f=plan.furn[i]; if(f){ delete f.w; delete f.d; delete f.h; delete f.color; } }); rebuildFurn(); updateFurnProp(); }; }

document.getElementById('view3d').onclick=()=>{ setWalk(false); const b=lastBounds(); const s=Math.max(b.span,6);
  cam.position.set(b.cx - s*0.15, s*0.85, b.cz + s*1.05); orbit.target.set(b.cx,0.4,b.cz); orbit.update(); markView('view3d'); };
document.getElementById('viewTop').onclick=()=>{ setWalk(false); const b=lastBounds(); cam.position.set(b.cx,Math.max(b.span*1.3,8),b.cz+0.001); orbit.target.set(b.cx,0,b.cz); orbit.update(); markView('viewTop'); };
document.getElementById('ceil').onclick=()=>{ showCeil=!showCeil; document.getElementById('ceil').classList.toggle('act',showCeil); rebuild(); };
document.getElementById('wallghost').onclick=()=>{ wallGhost=!wallGhost; document.getElementById('wallghost').classList.toggle('act',wallGhost);
  MATS.wall.transparent=wallGhost; MATS.wall.opacity=wallGhost?0.22:1; MATS.wall.depthWrite=!wallGhost; MATS.wall.needsUpdate=true; rebuild(); };
document.getElementById('lbl').onclick=()=>{ showLabels=!showLabels; document.getElementById('lbl').classList.toggle('act',showLabels); rebuildFurn(); render2d(); };
document.getElementById('walk').onclick=()=>setWalk(!walkMode);
function markView(id){['view3d','viewTop'].forEach(x=>document.getElementById(x).classList.toggle('act',x===id));}
function lastBounds(){ const b=buildFloor(new THREE.Group())||{minx:0,miny:0,maxx:6,maxy:4}; return {cx:(b.minx+b.maxx)/2,cz:(b.miny+b.maxy)/2,span:Math.max(b.maxx-b.minx,b.maxy-b.miny)}; }
function setWalk(on){ walkMode=on; document.getElementById('walk').classList.toggle('act',on);
  if(on){ const b=lastBounds(); cam.position.set(b.cx,1.6,b.cz); orbit.enabled=false; fp.lock(); document.getElementById('hint3d').textContent='WASD 移動・滑鼠看・Esc 離開'; }
  else { orbit.enabled=true; try{fp.unlock();}catch(e){} document.getElementById('hint3d').textContent='滑鼠拖曳轉視角・滾輪縮放・右鍵平移'; } }
fp.addEventListener('unlock',()=>{ if(walkMode) setWalk(false); });

function resize3d(){ const r=c3d.parentElement.getBoundingClientRect(); renderer.setSize(r.width,r.height,false); cam.aspect=(r.width||1)/(r.height||1); cam.updateProjectionMatrix(); }
const clock=new THREE.Clock();
function loop(){ requestAnimationFrame(loop);
  if(!fitted&&cwrap.clientWidth>50) resize2d();
  const dt=clock.getDelta();
  if(walkMode&&fp.isLocked){ const sp=3*dt; const f=(keys['KeyW']?1:0)-(keys['KeyS']?1:0),s=(keys['KeyD']?1:0)-(keys['KeyA']?1:0);
    fp.moveForward(f*sp); fp.moveRight(s*sp); cam.position.y=1.6; } else orbit.update();
  renderer.render(scene,cam); }

function samplePlan(){   // 預設＝Maricopa 真實住宅平面圖描繪版（一開就看到「平面→3D」效果）
  const rooms=[[0,0,3.6,3.7],[3.6,0,11.4,3.7],[11.4,0,16.8,3.7],[0,3.7,3.6,7.2],[3.6,3.7,6.4,7.2],[6.4,3.7,11.4,9.8],[11.4,3.7,14,7.2],[14,3.7,16.8,9.8],[0,7.2,6.4,12.8],[6.4,9.8,9.6,12.8],[9.6,9.8,11.4,12.8],[11.4,7.2,14,9.8],[11.4,9.8,16.8,12.8]];
  const key=(a,b,c,d)=>{ if(a>c||(a===c&&b>d)){const t=[c,d,a,b];a=t[0];b=t[1];c=t[2];d=t[3];} return a.toFixed(2)+','+b.toFixed(2)+','+c.toFixed(2)+','+d.toFixed(2); };
  const wm=new Map(); for(const r of rooms){ const x1=r[0],y1=r[1],x2=r[2],y2=r[3]; const e=[[x1,y1,x2,y1],[x2,y1,x2,y2],[x1,y2,x2,y2],[x1,y1,x1,y2]]; for(const ed of e){ wm.set(key(ed[0],ed[1],ed[2],ed[3]),{x1:ed[0],y1:ed[1],x2:ed[2],y2:ed[3]}); } }
  return { wallH:2.8, wallT:0.12, walls:[...wm.values()],
    openings:[{x:3.6,y:1.8,type:'door'},{x:11.4,y:1.8,type:'door'},{x:3.6,y:5.4,type:'door'},{x:6.4,y:5.4,type:'door'},{x:5.0,y:7.2,type:'door'},{x:8.0,y:9.8,type:'door'},{x:10.5,y:9.8,type:'door'},{x:11.4,y:8.5,type:'door'},{x:12.7,y:9.8,type:'door'},{x:14.0,y:5.4,type:'door'},{x:11.4,y:5.4,type:'door'},{x:13.0,y:12.8,type:'door'},{x:3.0,y:12.8,type:'door'},{x:1.8,y:0,type:'window'},{x:7.0,y:0,type:'window'},{x:13.5,y:0,type:'window'},{x:0,y:1.8,type:'window'},{x:0,y:5.4,type:'window'},{x:0,y:10,type:'window'},{x:16.8,y:1.8,type:'window'},{x:16.8,y:6,type:'window'},{x:16.8,y:11,type:'window'},{x:8.0,y:12.8,type:'window'}],
    furn:[{type:'bed',x:1.0,y:1.0,rot:0},{type:'bed',x:13.8,y:1.9,rot:0},{type:'bed',x:1.0,y:5.4,rot:0},{type:'sofa',x:8.9,y:5.2,rot:0},{type:'table',x:8.9,y:7.6,rot:0},{type:'cabinet',x:4.6,y:4.3,rot:0},{type:'table',x:8.0,y:11.3,rot:0},{type:'desk',x:13.8,y:11.3,rot:0},{type:'toilet',x:15.6,y:5.0,rot:0},{type:'cabinet',x:12.5,y:5.4,rot:0}] };
}

// ===== 版面控制：可拖曳分割 + 左右/上下 + 全螢幕 =====
const wrapEl=document.querySelector('.wrap'), dividerEl=document.getElementById('divider');
let layout={axis:'row', split:50, mode:'split'};   // mode: split | only2d | only3d
function setAct(id,on){ const el=document.getElementById(id); if(el) el.classList.toggle('act',!!on); }
function applyLayout(){
  wrapEl.classList.toggle('col', layout.axis==='col');
  wrapEl.classList.toggle('only2d', layout.mode==='only2d');
  wrapEl.classList.toggle('only3d', layout.mode==='only3d');
  wrapEl.style.setProperty('--split', layout.split+'%');
  setAct('laySplit', layout.mode==='split'); setAct('lay2d', layout.mode==='only2d'); setAct('lay3d', layout.mode==='only3d');
  const ax=document.getElementById('layAxis'); if(ax) ax.textContent = layout.axis==='row' ? '⬌ 左右' : '⬍ 上下';
  resize2d(); resize3d(); reflowBars();   // 重算畫布尺寸 + 工具列溢出（Priority+）
}
document.getElementById('laySplit').onclick=()=>{ layout.mode='split'; applyLayout(); };
document.getElementById('lay2d').onclick=()=>{ layout.mode='only2d'; applyLayout(); };
document.getElementById('lay3d').onclick=()=>{ layout.mode='only3d'; applyLayout(); };
document.getElementById('layAxis').onclick=()=>{ layout.axis = layout.axis==='row'?'col':'row'; layout.mode='split'; applyLayout(); };
dividerEl.addEventListener('pointerdown',e=>{ e.preventDefault(); try{dividerEl.setPointerCapture(e.pointerId);}catch(_){} dividerEl.classList.add('drag');
  const onMove=ev=>{ const r=wrapEl.getBoundingClientRect();
    const pct = layout.axis==='row' ? (ev.clientX-r.left)/r.width*100 : (ev.clientY-r.top)/r.height*100;
    layout.split=Math.max(15,Math.min(85,pct)); wrapEl.style.setProperty('--split',layout.split+'%'); resize2d(); resize3d(); reflowBars(); };
  const onUp=()=>{ dividerEl.classList.remove('drag'); try{dividerEl.releasePointerCapture(e.pointerId);}catch(_){}
    window.removeEventListener('pointermove',onMove); window.removeEventListener('pointerup',onUp); };
  window.addEventListener('pointermove',onMove); window.addEventListener('pointerup',onUp); });
// ===== 縮放鈕（圍繞畫面中心放大縮小）=====
function zoomBy(f){ const cx=c2d.width/2,cy=c2d.height/2; const [wx,wy]=S2W(cx,cy);
  view.ppm=Math.max(3,Math.min(400,view.ppm*f)); view.ox=cx-wx*view.ppm; view.oy=cy-wy*view.ppm; render2d(); }
document.getElementById('zIn').onclick=()=>zoomBy(1.25);
document.getElementById('zOut').onclick=()=>zoomBy(0.8);
document.getElementById('zFit').onclick=()=>{ fitted=false; fit2d(); fitted=true; render2d(); };
// ===== 工具列爆滿 → 收進「⋯ 更多」下拉（Priority+ 溢出選單，業界標準做法）=====
function reflowBar(bar){ const o=bar._of; if(!o) return; const more=o.more, menu=o.menu;
  while(menu.firstChild) bar.insertBefore(menu.firstChild, more);   // 先全部收回工具列重新量
  more.style.display='none'; menu.style.display='none';
  if(bar.scrollWidth<=bar.clientWidth+1) return;                    // 放得下 → 不需溢出
  more.style.display='';
  let guard=0;
  while(bar.scrollWidth>bar.clientWidth+1 && guard++<300){          // 把最右邊、非釘選的逐一收進選單
    let n=more.previousElementSibling, victim=null, last=null;
    while(n){ if(n!==more && n.offsetWidth>0){ if(!last) last=n; if(!n.classList.contains('pin')){ victim=n; break; } } n=n.previousElementSibling; }
    const t=victim||last; if(!t) break; menu.insertBefore(t, menu.firstChild);
  }
}
function reflowBars(){ document.querySelectorAll('.tools').forEach(reflowBar); }
function setupOverflow(bar){
  const more=document.createElement('div'); more.className='tool ofmore'; more.textContent='⋯ 更多'; more.style.display='none'; bar.appendChild(more);
  const menu=document.createElement('div'); menu.className='ofmenu'; menu.style.display='none'; bar.parentNode.insertBefore(menu, bar.nextSibling);
  menu._more=more; bar._of={more,menu};
  more.onclick=(e)=>{ e.stopPropagation();
    if(menu.style.display==='none'){ const r=more.getBoundingClientRect(); menu.style.display='flex';
      menu.style.top=(r.bottom+5)+'px'; menu.style.right=Math.max(6,Math.round(window.innerWidth-r.right))+'px'; }
    else menu.style.display='none'; };
  menu.addEventListener('click',(e)=>{ if(e.target.closest('.tool')) menu.style.display='none'; });  // 點工具才關；拉 slider/選 select 不關
  new ResizeObserver(()=>reflowBar(bar)).observe(bar);
  reflowBar(bar);
}
document.addEventListener('click',(e)=>{ document.querySelectorAll('.ofmenu').forEach(m=>{ if(m.style.display!=='none' && !m.contains(e.target) && !(m._more&&m._more.contains(e.target))) m.style.display='none'; }); });
document.querySelectorAll('.tools').forEach(setupOverflow);
applyLayout();

new ResizeObserver(()=>resize2d()).observe(cwrap);
new ResizeObserver(()=>resize3d()).observe(c3d.parentElement);
plan=samplePlan(); wallHEl.value=plan.wallH;
setTimeout(()=>{ resize2d(); resize3d();
  const dm=new URLSearchParams(location.search).get('tmpl');   // 網址 ?tmpl=eng1 → 一開就自動放該模板（demo／分享連結）
  if(dm&&TEMPLATES[dm]){ plan=emptyPlan(); const ts=document.getElementById('tmplType'); if(ts)ts.value=dm; placeTemplate(0,0);
    const b=lastBounds(); const s=Math.max(b.span,2.4);                          // demo：3D 相機自動對準工位＋拉近看細節
    cam.position.set(b.cx-s*0.5, s*0.95, b.cz+s*1.15); orbit.target.set(b.cx,0.5,b.cz); orbit.update(); }
  fit2d(); rebuild(); },50);
loop();
window.PLAN=()=>plan;
window.__dbg={ plan:()=>plan, size:(w,h)=>{c2d.width=w;c2d.height=h;fitted=false;fit2d();fitted=true;render2d();}, snapTest:(fi,nx,ny)=>snapFurn(fi,nx,ny),
  seatPlan:(x1,y1,x2,y2)=>seatFillPlan({x1,y1,x2,y2}), seatFill:(x1,y1,x2,y2)=>seatFillApply({x1,y1,x2,y2}),
  drawWall:(x1,y1,x2,y2)=>{pushHistory();plan.walls.push({x1,y1,x2,y2});rebuild();return plan.walls.length;},
  pack:(k)=>{currentPack=k;packSel.value=k;applyPack();rebuild();},
  loadPlan:(o)=>{ plan=Object.assign(emptyPlan(),o); document.getElementById('wallH').value=plan.wallH||2.8; clearSel(); fitted=false; fit2d(); fitted=true; rebuild(); },
  snap:(which)=>{ if(which==='3d'){ renderer.render(scene,cam); return c3d.toDataURL('image/png'); } return c2d.toDataURL('image/png'); },
  setCrop:(a,b,c,d)=>{ cropRect={x1:a,y1:b,x2:c,y2:d}; render2d(); },
  scale:(f)=>{ pushHistory(); scalePlan(f); fitted=false; fit2d(); fitted=true; rebuild(); return {walls:plan.walls.length}; },
  selBox:(x1,y1,x2,y2)=>{ selWalls.clear(); plan.walls.forEach((w,i)=>{ if(wallInRect(w,{x1,y1,x2,y2})) selWalls.add(i); }); render2d(); return selWalls.size; },
  delSel:()=>{ const n=selWalls.size; delSelWalls(); return n; },
  wlen:(i)=>{ const w=plan.walls[i]; return w?Math.hypot(w.x2-w.x1,w.y2-w.y1):null; },
  selFurnSet:(arr)=>{ selFurn=new Set(arr); render2d(); return [...selFurn]; },
  selFurnGet:()=>[...selFurn],
  w2s:(wx,wy)=>{ const [sx,sy]=W2S(wx,wy); const r=c2d.getBoundingClientRect(); return {clientX:r.left+sx, clientY:r.top+sy}; },
  setSimplify:(v)=>{ const s=document.getElementById('ulSimplify'); s.value=v; document.getElementById('ulSimVal').textContent=(+v).toFixed(1); },
  calibTest:()=>{ if(!underlay) return 'no underlay'; ulKey='__test__';
    underlay.x=3.3; underlay.y=2.2; underlay.scale=0.05; underlay.base=0.04; underlay.opacity=0.5; saveCalib();
    underlay.x=99; underlay.y=99; underlay.scale=9; underlay.base=9; underlay.opacity=0.1;   // 打亂
    const ok=restoreCalib(); return {restored:ok, x:underlay.x, y:underlay.y, scale:underlay.scale, base:underlay.base, opacity:underlay.opacity}; },
  imgTest:(url)=>new Promise(res=>{ const im=new Image(); im.onload=()=>{ setUnderlay(im);
    res({set:!!underlay,w:im.width,h:im.height,scale:underlay.scale,opacity:underlay.opacity}); }; im.onerror=()=>res({err:'load'}); im.src=url; }),
  ulInfo:()=>underlay?{x:underlay.x,y:underlay.y,scale:underlay.scale,opacity:underlay.opacity}:null,
  ulSet:(o)=>{ if(!underlay) return null; Object.assign(underlay,o); render2d(); return {x:underlay.x,y:underlay.y,scale:underlay.scale}; },
  gtTest:()=>saveGt(true),
  backendSet:(v)=>{ _pdfBackend=v; return _pdfBackend; }, backendGet:async()=>await pdfBackendAlive(),
  furnTest:()=>autoFurn(),
  rooms:()=>{ const A=analyzeRooms(); return A?{n:A.rooms.length,rooms:A.rooms.map((r,i)=>({i,area:+r.area.toFixed(2),doors:r.doors,reach:r.reach})),edges:A.edges.map(e=>[e.a,e.b])}:null; },
  light:()=>{ const A=computeLight(); return A?A.rooms.map((r,i)=>({i,lux:r.lux})):null; },
  roomsOn:(v)=>{ showRooms=!!v; roomBtn.classList.toggle('act',showRooms); render2d(); return showRooms; },
  lightOn:(v)=>{ showLight=!!v; lightBtn.classList.toggle('act',showLight); render2d(); return showLight; },
  scSave:(n)=>{ const s=scSave(n); return {name:s.name,stats:s.stats}; },
  scLoad:(i)=>{ scLoad(i); return {walls:plan.walls.length,furn:plan.furn.length}; },
  scList:()=>scens.map(s=>({name:s.name,stats:s.stats})),
  scClear:()=>{ scens=[]; scPersist(); scRender(); return 0; },
  pdfTest:async(url)=>{ const r=await fetch(url); const f=new File([await r.blob()],'t.pdf',{type:'application/pdf'});
    const im=await pdfToImage(f); return {w:im.width,h:im.height}; } };
